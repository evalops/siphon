{{- if .Values.networkPolicy.enabled }}
{{- $egress := list }}
{{- with .Values.networkPolicy.egress }}
  {{- range . }}
    {{- $egress = append $egress . }}
  {{- end }}
{{- end }}
{{- if .Values.networkPolicy.allowConfigPorts }}
  {{- $derivedPorts := include "ensemble-tap.networkPolicyConfigPorts" . | fromYamlArray }}
  {{- $derivedTCP := list }}
  {{- range $port := $derivedPorts }}
    {{- $derivedTCP = append $derivedTCP (dict "protocol" "TCP" "port" $port) }}
  {{- end }}
  {{- if gt (len $derivedTCP) 0 }}
    {{- $egress = append $egress (dict "ports" $derivedTCP) }}
  {{- end }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ensemble-tap.fullname" . }}
  labels:
    {{- include "ensemble-tap.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ensemble-tap.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.ingress }}
    {{- toYaml .Values.networkPolicy.ingress | nindent 4 }}
    {{- else }}
    - {}
    {{- end }}
  egress:
    {{- if $egress }}
    {{- toYaml $egress | nindent 4 }}
    {{- else }}
    []
    {{- end }}
{{- end }}
