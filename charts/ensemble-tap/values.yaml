replicaCount: 1

image:
  repository: ghcr.io/evalops/ensemble-tap
  pullPolicy: IfNotPresent
  tag: ""
  digest: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automount: false

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ensemble-tap.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null
  customMetrics: []

podDisruptionBudget:
  enabled: true
  minAvailable: 1
  maxUnavailable: null

networkPolicy:
  enabled: true
  # Add one TCP egress rule that is auto-derived from config.nats.url and
  # config.clickhouse.addr, plus networkPolicy.extraEgressPorts.
  allowConfigPorts: true
  # Additional egress TCP ports to allow cluster-wide.
  extraEgressPorts: []
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS lookups.
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow outbound HTTPS for SaaS poller APIs.
    - ports:
        - protocol: TCP
          port: 443
    # NATS/ClickHouse ports are derived automatically when allowConfigPorts=true.

nodeSelector: {}
tolerations: []
affinity: {}
extraVolumeMounts: []
extraVolumes: []

env: []
# - name: TAP_ADMIN_TOKEN
#   valueFrom:
#     secretKeyRef:
#       name: ensemble-tap-secrets
#       key: adminToken
# - name: TAP_ADMIN_TOKEN_READ
#   valueFrom:
#     secretKeyRef:
#       name: ensemble-tap-secrets
#       key: adminTokenRead

envSecrets: []
# - name: TAP_ADMIN_TOKEN
#   secretName: ensemble-tap-secrets
#   secretKey: adminToken
# - name: TAP_ADMIN_TOKEN_READ
#   secretName: ensemble-tap-secrets
#   secretKey: adminTokenRead

envFromSecret: ""

persistence:
  enabled: false
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  storageClassName: ""
  mountPath: /var/lib/ensemble-tap/state

config:
  providers: {}
  nats:
    url: nats://nats:4222
    stream: ENSEMBLE_TAP
    subject_prefix: ensemble.tap
    tenant_scoped_subjects: false
    max_age: 168h
    dedup_window: 2m
    connect_timeout: 5s
    reconnect_wait: 2s
    max_reconnects: -1
    publish_timeout: 5s
    publish_max_retries: 3
    publish_retry_backoff: 100ms
    # Set one auth mode only: username/password, token, or creds_file.
    username: ""
    password: ""
    token: ""
    creds_file: ""
    secure: false
    insecure_skip_verify: false
    ca_file: ""
    cert_file: ""
    key_file: ""
    stream_replicas: 1
    stream_storage: file
    stream_discard: old
    stream_max_consumers: 0
    stream_max_msgs_per_subject: 0
    stream_compression: none
    stream_allow_msg_ttl: false
    stream_max_msgs: 0
    stream_max_bytes: 0
    stream_max_msg_size: 0
  clickhouse:
    addr: ""
    database: ensemble
    table: tap_events
    username: default
    password: ${CLICKHOUSE_PASSWORD}
    secure: false
    insecure_skip_verify: false
    tls_server_name: ""
    ca_file: ""
    cert_file: ""
    key_file: ""
    dial_timeout: 5s
    max_open_conns: 4
    max_idle_conns: 2
    conn_max_lifetime: 30m
    batch_size: 500
    flush_interval: 2s
    consumer_name: tap_clickhouse_sink
    consumer_fetch_batch_size: 100
    consumer_fetch_max_wait: 500ms
    consumer_ack_wait: 30s
    consumer_max_ack_pending: 1000
    consumer_max_deliver: 0
    consumer_backoff: []
    consumer_max_waiting: 0
    consumer_max_request_max_bytes: 0
    insert_timeout: 10s
    retention_ttl: 8760h
  vault:
    address: ${VAULT_ADDR}
    namespace: ${VAULT_NAMESPACE}
    auth_method: kubernetes
    token: ${VAULT_TOKEN}
    token_file: ""
    kubernetes_role: ""
    kubernetes_mount_path: kubernetes
    kubernetes_jwt_file: /var/run/secrets/kubernetes.io/serviceaccount/token
  server:
    port: 8080
    base_path: /webhooks
    read_timeout: 10s
    write_timeout: 5s
    max_body_size: 1048576
    admin_token: ${TAP_ADMIN_TOKEN}
    admin_token_secondary: ${TAP_ADMIN_TOKEN_SECONDARY}
    admin_token_read: ${TAP_ADMIN_TOKEN_READ}
    admin_token_replay: ${TAP_ADMIN_TOKEN_REPLAY}
    admin_token_cancel: ${TAP_ADMIN_TOKEN_CANCEL}
    admin_replay_max_limit: 2000
    admin_replay_job_ttl: 24h
    admin_replay_job_max_jobs: 512
    admin_replay_job_timeout: 5m
    admin_replay_max_concurrent_jobs: 2
    admin_replay_store_backend: memory
    admin_replay_sqlite_path: /var/lib/ensemble-tap/state/tap-admin-replay.db
    admin_replay_require_reason: false
    admin_replay_reason_min_length: 12
    admin_replay_max_queued_per_ip: 100
    admin_replay_max_queued_per_token: 20
    admin_rate_limit_per_sec: 5
    admin_rate_limit_burst: 20
  state:
    backend: memory
    sqlite_path: /var/lib/ensemble-tap/state/tap-state.db
