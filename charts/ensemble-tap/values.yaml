replicaCount: 1

image:
  repository: ghcr.io/evalops/ensemble-tap
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ensemble-tap.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null
  customMetrics: []

podDisruptionBudget:
  enabled: true
  minAvailable: 1
  maxUnavailable: null

networkPolicy:
  enabled: true
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
  egress:
    - {}

nodeSelector: {}
tolerations: []
affinity: {}

env: []
# - name: TAP_ADMIN_TOKEN
#   valueFrom:
#     secretKeyRef:
#       name: ensemble-tap-secrets
#       key: adminToken

envSecrets: []
# - name: TAP_ADMIN_TOKEN
#   secretName: ensemble-tap-secrets
#   secretKey: adminToken

envFromSecret: ""

persistence:
  enabled: false
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  storageClassName: ""
  mountPath: /var/lib/ensemble-tap/state

config:
  providers: {}
  nats:
    url: nats://nats:4222
    stream: ENSEMBLE_TAP
    subject_prefix: ensemble.tap
    tenant_scoped_subjects: false
    max_age: 168h
    dedup_window: 2m
  clickhouse:
    addr: clickhouse:9000
    database: ensemble
    table: tap_events
    batch_size: 500
    flush_interval: 2s
  server:
    port: 8080
    base_path: /webhooks
    read_timeout: 10s
    write_timeout: 5s
    max_body_size: 1048576
    admin_token: ${TAP_ADMIN_TOKEN}
    admin_token_secondary: ${TAP_ADMIN_TOKEN_SECONDARY}
    admin_replay_max_limit: 2000
    admin_replay_job_ttl: 24h
    admin_replay_job_max_jobs: 512
    admin_rate_limit_per_sec: 5
    admin_rate_limit_burst: 20
  state:
    backend: memory
    sqlite_path: /var/lib/ensemble-tap/state/tap-state.db
