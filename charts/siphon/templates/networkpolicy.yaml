{{- if .Values.networkPolicy.enabled }}
{{- $egress := list }}
{{- with .Values.networkPolicy.egress }}
  {{- range . }}
    {{- $egress = append $egress . }}
  {{- end }}
{{- end }}
{{- if .Values.networkPolicy.allowConfigPorts }}
  {{- $natsPorts := include "siphon.networkPolicyNATSPorts" . | fromYamlArray }}
  {{- $natsTCP := list }}
  {{- range $port := $natsPorts }}
    {{- $natsTCP = append $natsTCP (dict "protocol" "TCP" "port" $port) }}
  {{- end }}
  {{- if gt (len $natsTCP) 0 }}
    {{- $natsRule := dict "ports" $natsTCP }}
    {{- with .Values.networkPolicy.natsEgressTo }}
      {{- if gt (len .) 0 }}
        {{- $_ := set $natsRule "to" . }}
      {{- end }}
    {{- end }}
    {{- $egress = append $egress $natsRule }}
  {{- end }}

  {{- $clickhousePorts := include "siphon.networkPolicyClickHousePorts" . | fromYamlArray }}
  {{- $clickhouseTCP := list }}
  {{- range $port := $clickhousePorts }}
    {{- $clickhouseTCP = append $clickhouseTCP (dict "protocol" "TCP" "port" $port) }}
  {{- end }}
  {{- if gt (len $clickhouseTCP) 0 }}
    {{- $clickhouseRule := dict "ports" $clickhouseTCP }}
    {{- with .Values.networkPolicy.clickhouseEgressTo }}
      {{- if gt (len .) 0 }}
        {{- $_ := set $clickhouseRule "to" . }}
      {{- end }}
    {{- end }}
    {{- $egress = append $egress $clickhouseRule }}
  {{- end }}

  {{- $extraPorts := include "siphon.networkPolicyExtraPorts" . | fromYamlArray }}
  {{- $extraTCP := list }}
  {{- range $port := $extraPorts }}
    {{- $extraTCP = append $extraTCP (dict "protocol" "TCP" "port" $port) }}
  {{- end }}
  {{- if gt (len $extraTCP) 0 }}
    {{- $egress = append $egress (dict "ports" $extraTCP) }}
  {{- end }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "siphon.fullname" . }}
  labels:
    {{- include "siphon.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "siphon.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.ingress }}
    {{- toYaml .Values.networkPolicy.ingress | nindent 4 }}
    {{- else }}
    - {}
    {{- end }}
  egress:
    {{- if $egress }}
    {{- toYaml $egress | nindent 4 }}
    {{- else }}
    []
    {{- end }}
{{- end }}
