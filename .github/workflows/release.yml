name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: evalops/service-runtime/.github/actions/setup-go-service@e9e24df11fe3162fba91fbc7d138ca43496bbd27
        with:
          go-version: "1.26.2"
          download: "false"

      - name: Test
        run: go test ./...

      - name: Build and push image
        id: build
        uses: evalops/service-runtime/.github/actions/publish-ghcr-image@e9e24df11fe3162fba91fbc7d138ca43496bbd27
        with:
          image_name: ghcr.io/${{ github.repository }}
          github_actor: ${{ github.actor }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dockerfile: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          setup_qemu: "true"
          push: "true"
          metadata_tags: |
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Prepare dist directory
        run: mkdir -p dist

      - name: Generate source SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/source-sbom.spdx.json

      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: dist/image-sbom.spdx.json

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          helm lint charts/siphon
          helm package charts/siphon --destination dist

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 * > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image (keyless)
        run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

      - name: Attest image SBOM
        run: |
          cosign attest --yes \
            --type spdxjson \
            --predicate dist/image-sbom.spdx.json \
            ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

      - name: Sign release checksums
        run: |
          cosign sign-blob --yes \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem \
            dist/checksums.txt

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tgz
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem
            dist/source-sbom.spdx.json
            dist/image-sbom.spdx.json
          body: |
            Container images:
            ${{ steps.build.outputs.tags }}

            Digest:
            ${{ steps.build.outputs.digest }}
