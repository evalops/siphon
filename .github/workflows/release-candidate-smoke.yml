name: Release Candidate Smoke

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to validate
        required: false
        default: main
      release_name:
        description: Helm release name for smoke install
        required: false
        default: siphon
      namespace:
        description: Kubernetes namespace for smoke install
        required: false
        default: siphon-rc

permissions:
  contents: read

env:
  GOTOOLCHAIN: go1.26.2
  TAP_IMAGE_REPO: siphon
  NATS_IMAGE: nats:2.12.4-alpine

jobs:
  rc-smoke:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Go
        uses: evalops/service-runtime/.github/actions/setup-go-service@d348819979602be3a2b8349b5dccd41488bb7cd2
        with:
          go-version: "1.26.2"
          download: "false"

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kind
        uses: helm/kind-action@v1
        with:
          cluster_name: rc-smoke

      - name: Set image tag
        run: echo "IMAGE_TAG=rc-${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_ENV"

      - name: Build release-candidate image
        uses: evalops/service-runtime/.github/actions/build-docker-image@d348819979602be3a2b8349b5dccd41488bb7cd2
        with:
          dockerfile: ./Dockerfile
          tags: ${{ env.TAP_IMAGE_REPO }}:${{ env.IMAGE_TAG }}
          load: "true"

      - name: Load image into kind
        run: kind load docker-image "${TAP_IMAGE_REPO}:${IMAGE_TAG}" --name rc-smoke

      - name: Deploy NATS JetStream dependency
        run: |
          kubectl create namespace "${{ inputs.namespace }}" --dry-run=client -o yaml | kubectl apply -f -
          cat <<MANIFEST | kubectl -n "${{ inputs.namespace }}" apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: nats
            labels:
              app: nats
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: nats
            template:
              metadata:
                labels:
                  app: nats
              spec:
                containers:
                  - name: nats
                    image: ${NATS_IMAGE}
                    args: ["-js"]
                    ports:
                      - name: client
                        containerPort: 4222
                      - name: monitor
                        containerPort: 8222
                    readinessProbe:
                      tcpSocket:
                        port: 4222
                      initialDelaySeconds: 2
                      periodSeconds: 2
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: nats
          spec:
            selector:
              app: nats
            ports:
              - name: client
                port: 4222
                targetPort: client
              - name: monitor
                port: 8222
                targetPort: monitor
          MANIFEST
          kubectl -n "${{ inputs.namespace }}" rollout status deployment/nats --timeout=120s

      - name: Deploy siphon Helm release
        env:
          ONBOARDING_SECRET: rc-generic-secret
        run: |
          helm upgrade --install "${{ inputs.release_name }}" ./charts/siphon \
            --namespace "${{ inputs.namespace }}" \
            --set image.repository="${TAP_IMAGE_REPO}" \
            --set image.tag="${IMAGE_TAG}" \
            --set config.nats.url="nats://nats:4222" \
            --set config.providers.generic.secret="${ONBOARDING_SECRET}" \
            --wait --timeout 180s

      - name: Validate /readyz + end-to-end publish path
        env:
          ONBOARDING_SECRET: rc-generic-secret
        run: |
          ./scripts/smoke-onboarding.sh \
            --provider generic \
            --secret "${ONBOARDING_SECRET}" \
            --release "${{ inputs.release_name }}" \
            --namespace "${{ inputs.namespace }}" \
            --local-port 18080

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl -n "${{ inputs.namespace }}" get all
          kubectl -n "${{ inputs.namespace }}" logs deploy/nats --tail=200 || true
          kubectl -n "${{ inputs.namespace }}" logs deploy/${{ inputs.release_name }} --tail=200 || true
