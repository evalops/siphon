name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTOOLCHAIN: go1.24.13

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Coverage
        env:
          MIN_COVERAGE: "75"
        run: |
          go test ./... -coverprofile=coverage.out
          go tool cover -func=coverage.out
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/, "", $3); print $3}')"
          echo "Total coverage: ${total}% (minimum: ${MIN_COVERAGE}%)"
          awk -v got="$total" -v min="$MIN_COVERAGE" 'BEGIN { if (got+0 < min+0) { printf("coverage %.1f%% is below minimum %.1f%%\n", got, min); exit 1 } }'

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile
          path: coverage.out

  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@v0.6.1

      - name: Run staticcheck
        run: $(go env GOPATH)/bin/staticcheck ./...

  openapi-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify admin OpenAPI contract
        run: go test ./cmd/tap -run TestAdminOpenAPIContractMatchesRuntime -count=1

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build .

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint Chart
        run: helm lint charts/ensemble-tap

      - name: Render Chart
        run: helm template ensemble-tap charts/ensemble-tap >/dev/null

  security-gosec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.23.0

      - name: Run gosec
        run: $(go env GOPATH)/bin/gosec -exclude=G117 ./...

  security-govulncheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: $(go env GOPATH)/bin/govulncheck ./...

  security-trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.34.2
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          ignore-unfixed: true
          version: v0.69.3
          exit-code: '1'

  security-sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate source SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom-source.spdx.json

      - name: Upload source SBOM
        uses: actions/upload-artifact@v4
        with:
          name: source-sbom
          path: sbom-source.spdx.json

  perf-smoke:
    runs-on: ubuntu-latest
    env:
      TAP_SERVER_PORT: "18080"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Start NATS
        run: docker run -d --name tap-nats -p 4222:4222 nats:2.11-alpine -js

      - name: Build tap
        run: go build -o ./bin/ensemble-tap ./cmd/tap

      - name: Start tap
        run: |
          ./bin/ensemble-tap -config .github/perf/config.yaml > /tmp/tap.log 2>&1 &
          echo $! > /tmp/tap.pid

      - name: Wait for readiness
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:${TAP_SERVER_PORT}/livez" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "tap failed to become ready" >&2
          cat /tmp/tap.log >&2 || true
          exit 1

      - name: Run k6 smoke
        env:
          BASE_URL: http://127.0.0.1:${{ env.TAP_SERVER_PORT }}
          K6_VUS: "20"
          K6_DURATION: 30s
        run: k6 run .github/perf/smoke.js

      - name: Dump logs on failure
        if: failure()
        run: |
          cat /tmp/tap.log || true
          docker logs tap-nats || true

      - name: Stop tap + NATS
        if: always()
        run: |
          if [ -f /tmp/tap.pid ]; then
            kill "$(cat /tmp/tap.pid)" || true
          fi
          docker rm -f tap-nats || true

  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start NATS + ClickHouse
        run: |
          docker run -d --name tap-nats -p 4222:4222 -p 8222:8222 nats:2.11-alpine -js
          docker run -d --name tap-clickhouse -p 8123:8123 -p 9000:9000 clickhouse/clickhouse-server:24

      - name: Wait for services
        run: |
          wait_for_port() {
            local host="$1"
            local port="$2"
            local timeout="$3"
            for i in $(seq 1 "$timeout"); do
              (echo >"/dev/tcp/$host/$port") >/dev/null 2>&1 && return 0
              sleep 1
            done
            return 1
          }

          wait_for_http() {
            local url="$1"
            local timeout="$2"
            for i in $(seq 1 "$timeout"); do
              curl -fsS "$url" >/dev/null && return 0
              sleep 1
            done
            return 1
          }

          wait_for_port 127.0.0.1 4222 60
          wait_for_http http://127.0.0.1:8123/ping 60

      - name: Run Real Integration Test
        env:
          NATS_URL: nats://127.0.0.1:4222
          CLICKHOUSE_ADDR: 127.0.0.1:9000
        run: go test -tags=integration ./internal/publish -run TestRealNATSClickHousePipeline -count=1

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker logs tap-nats || true
          docker logs tap-clickhouse || true

      - name: Stop containers
        if: always()
        run: |
          docker rm -f tap-nats tap-clickhouse || true
